<!DOCTYPE html>
<html>
<head>
  <title>Codivora Assessment</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0,255,255,0.1);
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background: cyan;
      color: black;
      font-weight: bold;
      margin-top: 10px;
    }

    .option {
      display: block;
      background: #334155;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
      cursor: pointer;
    }

    .option:hover {
      background: #475569;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
    }

    video {
      position: fixed;
      top: 10px;
      right: 10px;
      width: 180px;
      border-radius: 10px;
      border: 2px solid cyan;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div id="login" class="card">
    <h2>Codivora Assessment Portal</h2>
    <input id="id" placeholder="Candidate ID">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

  <!-- TEST -->
  <div id="test" class="hidden">

    <div class="topbar">
      <div id="progress"></div>
      <div id="timer"></div>
    </div>

    <video id="cam" autoplay muted></video>

    <div class="card">
      <h3 id="question"></h3>
      <div id="options"></div>

      <button onclick="next()">Next</button>
      <button onclick="submitTest()">Submit</button>
    </div>

  </div>

  <!-- SUBMITTED -->
  <div id="submitted" class="hidden card">
    <h1>Assessment Submitted</h1>
    <p>We will send your results soon via email.</p>
  </div>

</div>

<script>

// LOGIN
const users = [
  { id: "CODIUAE736197", pass: "Moumi@2002@SDE@INTERN" }
];

// 35 QUESTIONS
const questions = Array.from({ length: 35 }, (_, i) => ({
  q: "Question " + (i + 1) + ": Sample technical question?",
  o: ["Option A", "Option B", "Option C", "Option D", "Option E"],
  a: 0
}));

let current = 0;
let answers = [];
let time = 2100;

// LOGIN
function login() {
  const id = document.getElementById("id").value;
  const pass = document.getElementById("pass").value;

  const valid = users.some(u => u.id === id && u.pass === pass);

  if (!valid) return alert("Invalid login");

  document.getElementById("login").classList.add("hidden");
  document.getElementById("test").classList.remove("hidden");

  startCam();
  loadQ();
  startTimer();
}

// LOAD QUESTION
function loadQ() {
  const q = questions[current];

  document.getElementById("question").innerText = q.q;
  document.getElementById("progress").innerText =
    `Q ${current + 1} / ${questions.length}`;

  let html = "";
  q.o.forEach((opt, i) => {
    html += `<div class="option" onclick="select(${i})">${opt}</div>`;
  });

  document.getElementById("options").innerHTML = html;
}

// SELECT
function select(i) {
  answers[current] = i;
}

// NEXT
function next() {
  if (current < questions.length - 1) {
    current++;
    loadQ();
  }
}

// SUBMIT
function submitTest() {
  document.getElementById("test").classList.add("hidden");
  document.getElementById("submitted").classList.remove("hidden");
}

// TIMER
function startTimer() {
  setInterval(() => {
    time--;
    document.getElementById("timer").innerText =
      "Time: " + Math.floor(time / 60) + ":" + (time % 60);

    if (time <= 0) submitTest();
  }, 1000);
}

// CAMERA
function startCam() {
  navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => {
      document.getElementById("cam").srcObject = stream;
    });
}

</script>

</body>
</html>
